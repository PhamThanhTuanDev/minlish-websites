name: Deploy Frontend to cPanel

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 📦 Install Dependencies
      run: npm install --legacy-peer-deps

      # THÊM BƯỚC NÀY VÀO ĐÂY: Tạo file .env để Vite đọc được
    - name: 📝 Create env file
      run: |
        echo "VITE_API_BASE_URL=https://api.minlish.site" >> .env

    - name: 🛠️ Build Project
      run: npm run build

    # 🧹 XÓA FILE CŨ TRÊN SERVER + upload lại sạch
    - name: 🚀 Deploy to cPanel via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        server-dir: ./
        dangerous-clean-slate: true   # 🔥 QUAN TRỌNG NHẤT
        log-level: verbose            # để debug nếu cần